<!DOCTYPE html>
<!-- NS SHOP - Product Detailed Card -->
<!-- Saved at /d:/Project/Web/code/product-detail.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS SHOP - Product Details</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    
    <!-- Centralized CSS Styling -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/storefront.css">
    
    <!-- Google Fonts & Iconsets -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1">
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <header class="header-container">
        <div class="header-wrap">
            <!-- Brand Logo -->
            <a href="index.html" class="brand-logo">
                <img src="img/logo.png" alt="" class="brand-logo__img" width="30" height="40">
                <span class="brand-logo__name">NS SHOP</span>
            </a>
            
            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link active">Products</a>
                <a href="about.html" class="nav-link">About</a>
            </nav>
        </div>
    </header>

    <!-- Main Detail split view -->
    <main style="flex-grow: 1; max-width: 1200px; margin: 0 auto; padding: var(--spacing-lg) var(--spacing-margin-mobile); width: 100%; display: flex; flex-direction: column; gap: var(--spacing-md);">
        
        <!-- Back to browse catalog navigation -->
        <div>
            <a href="products.html" style="display: inline-flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 600; color: var(--color-on-surface-variant); hover:text-primary;" class="text-on-surface-variant">
                <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
                <span>Back to Products catalog</span>
            </a>
        </div>

        <!-- Split Grid Showcase (JS Populated) -->
        <div class="details-container">
            <!-- Left Side Image -->
            <div class="details-image-card">
                <img id="product-image" src="" alt="" class="details-image">
            </div>

            <!-- Right Side Info -->
            <div class="details-info">
                <div>
                    <span id="product-category" class="product-card-badge" style="position: static; display: inline-block; margin-bottom: 8px;"></span>
                    <h1 id="product-name" style="font-size: 32px; font-weight: 700; color: var(--color-on-surface); line-height: 1.2; margin-bottom: 8px;">Loading product...</h1>
                    <span id="product-price" style="font-size: 24px; font-weight: 700; color: var(--color-primary); display: block; margin-bottom: 12px;">LKR 0.00</span>
                </div>

                <div id="product-quantity" style="margin-bottom: var(--spacing-sm);">
                    <!-- Stock tag dynamically loaded -->
                </div>

                <div style="border-top: 1px solid var(--color-outline-variant); border-bottom: 1px solid var(--color-outline-variant); padding: 16px 0; margin-bottom: var(--spacing-sm);">
                    <h3 style="font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--color-on-surface-variant); margin-bottom: 8px; letter-spacing: 0.05em;">Product Description</h3>
                    <p id="product-desc" style="font-size: 14px; color: var(--color-on-surface-variant); line-height: 1.6;">Loading info...</p>
                </div>

                <div>
                    <button id="product-action-btn" class="btn btn-primary" style="width: 100%; padding: 14px;">Add to Cart</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Area -->
    <footer style="background-color: var(--color-surface-container-highest); border-top: 1px solid var(--color-outline-variant); padding: var(--spacing-lg) var(--spacing-margin-mobile); text-align: center; margin-top: auto;">
        <div class="flex-col-md-row" style="max-width: 1200px; margin: 0 auto; justify-content: space-between; align-items: center; gap: 16px;">
            <div style="text-align: left;">
                <div class="university-brand university-brand--footer">
                    <img src="img/logo 2.png" alt="NSBM Green University Town" class="university-brand__img">
                </div>
                <h3 style="font-size: 18px; font-weight: 700; color: var(--color-primary); margin-bottom: 4px;">NS SHOP</h3>
                <p style="font-size: 13px; color: var(--color-on-surface-variant);">Empowering campus creators and handmade craftsmanship.</p>
            </div>
            <div style="display: flex; gap: var(--spacing-md); font-size: 13px; font-weight: 500; color: var(--color-on-surface-variant);">
                <a href="#" class="text-primary-container">Campus Map</a>
                <a href="#" class="text-primary-container">Contact Us</a>
                <a href="#" class="text-primary-container">Terms</a>
                <a href="admin/login.html" class="text-primary-container">Admin Portal</a>
            </div>
        </div>
        <p style="font-size: 12px; color: var(--color-outline); margin-top: 24px;">© 2024 NS SHOP. All rights reserved.</p>
    </footer>

    <!-- Asynchronous JS Modules -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/router.js"></script>
    <script src="js/storefront.js"></script>
</body>
</html>
