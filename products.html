<!DOCTYPE html>
<!-- NSBM Mini Store - E-Commerce Products Browser -->
<!-- Saved at /d:/Project/Web/code/products.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM Mini Store - Explore Products</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    
    <!-- Centralized CSS Styling -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/storefront.css">
    
    <!-- Google Fonts & Iconsets -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1">
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <header class="header-container">
        <div class="header-wrap">
            <!-- Brand Logo -->
            <a href="index.html" class="brand-logo">
                <img src="img/logo.png" alt="" class="brand-logo__img" width="30" height="40">
                <span class="brand-logo__name">NSBM Mini Store</span>
            </a>
            
            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link active">Products</a>
                <a href="about.html" class="nav-link">About</a>
            </nav>
            
            <!-- Actions Section -->
            <div class="flex" style="display: flex; align-items: center; gap: 12px;">
                <a href="admin/login.html" class="btn btn-secondary" style="padding: 8px 16px; border-radius: var(--radius-lg);">Admin Portal</a>
            </div>
        </div>
    </header>

    <!-- Main Catalog View -->
    <main style="flex-grow: 1; max-width: 1200px; margin: 0 auto; padding: var(--spacing-lg) var(--spacing-margin-mobile); width: 100%;">
        
        <!-- Header details & Keyword Search bar -->
        <div class="flex-col-md-row" style="justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: var(--spacing-md);">
            <div>
                <h1 style="font-size: 32px; font-weight: 700; color: var(--color-on-surface); margin-bottom: 4px;">Explore Products</h1>
                <p style="font-size: 14px; color: var(--color-on-surface-variant);">Discover unique items created by creative NSBM students.</p>
            </div>
            
            <!-- Text Search outline -->
            <div style="position: relative; width: 100%; max-width: 320px;">
                <span class="material-symbols-outlined" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-outline); pointer-events: none;">search</span>
                <input type="text" id="search-input" class="input-field" placeholder="Search product name..." style="padding-left: 40px; width: 100%;">
            </div>
        </div>

        <!-- Bento Category Filter Chips -->
        <div id="category-chips" class="chips-bar">
            <button data-category="all" class="chip active">All Catalog</button>
            <button data-category="Apparel" class="chip">Apparel</button>
            <button data-category="Stationery" class="chip">Stationery</button>
            <button data-category="Handmade Crafts" class="chip">Handmade Crafts</button>
            <button data-category="Digital Art" class="chip">Digital Art</button>
            <button data-category="Baked Goods" class="chip">Baked Goods</button>
        </div>

        <!-- Dynamic Product Listing Grid (JS populated) -->
        <div id="products-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--spacing-gutter); width: 100%;">
            <!-- Populated asynchronously via storefront.js -->
        </div>

    </main>

    <!-- Footer Area -->
    <footer style="background-color: var(--color-surface-container-highest); border-top: 1px solid var(--color-outline-variant); padding: var(--spacing-lg) var(--spacing-margin-mobile); text-align: center; margin-top: auto;">
        <div class="flex-col-md-row" style="max-width: 1200px; margin: 0 auto; justify-content: space-between; align-items: center; gap: 16px;">
            <div style="text-align: left;">
                <div class="university-brand university-brand--footer">
                    <img src="img/logo 2.png" alt="NSBM Green University Town" class="university-brand__img">
                </div>
                <h3 style="font-size: 18px; font-weight: 700; color: var(--color-primary); margin-bottom: 4px;">NSBM Mini Store</h3>
                <p style="font-size: 13px; color: var(--color-on-surface-variant);">Empowering campus creators and handmade craftsmanship.</p>
            </div>
            <div style="display: flex; gap: var(--spacing-md); font-size: 13px; font-weight: 500; color: var(--color-on-surface-variant);">
                <a href="#" class="text-primary-container">Campus Map</a>
                <a href="#" class="text-primary-container">Contact Us</a>
                <a href="#" class="text-primary-container">Terms</a>
            </div>
        </div>
        <p style="font-size: 12px; color: var(--color-outline); margin-top: 24px;">© 2024 NSBM Mini Store. All rights reserved.</p>
    </footer>

    <!-- Asynchronous JS Modules -->
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/router.js"></script>
    <script src="js/storefront.js"></script>
</body>
</html>
