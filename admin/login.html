<!DOCTYPE html>
<!-- NSBM Mini Store - Admin Portal Login Access -->
<!-- Saved at /d:/Project/Web/code/admin/login.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSBM Mini Store - Admin Portal Login</title>
    
    <!-- Centralized CSS Styling -->
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/components.css">
    
    <!-- Google Fonts & Iconsets -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--color-surface-container-low); padding: var(--spacing-sm);">

    <!-- Login credentials Card container -->
    <div style="width: 100%; max-width: 440px; background-color: var(--color-surface); border: 1px solid var(--color-outline-variant); border-radius: 20px; padding: var(--spacing-md); box-shadow: var(--shadow-level-3); display: flex; flex-direction: column; gap: 20px;">
        
        <!-- Header Brand -->
        <div style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px;">
            <div style="width: 56px; height: 56px; border-radius: var(--radius-xl); background-color: var(--color-primary-container); color: var(--color-on-primary); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-level-1);">
                <span class="material-symbols-outlined" style="font-size: 32px; font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
            </div>
            <h1 style="font-size: 24px; font-weight: 700; color: var(--color-primary); margin-top: 8px;">Admin Portal Access</h1>
            <p style="font-size: 13px; color: var(--color-on-surface-variant);">Authentication required to access inventory database catalogs.</p>
        </div>

        <!-- Form fields details -->
        <form id="login-form" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label for="username" style="font-size: 13px; font-weight: 600; color: var(--color-on-surface-variant); display: block; margin-bottom: 4px;">Portal Username</label>
                <input type="text" id="username" class="input-field" required placeholder="admin">
            </div>
            <div>
                <label for="password" style="font-size: 13px; font-weight: 600; color: var(--color-on-surface-variant); display: block; margin-bottom: 4px;">Access Password</label>
                <input type="password" id="password" class="input-field" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 14px; font-weight: 700; display: flex; justify-content: center; gap: 8px; margin-top: 8px;">
                <span class="material-symbols-outlined" style="font-size: 18px;">login</span>
                <span>Authenticate Logins</span>
            </button>
        </form>

        <!-- Return Back navigation -->
        <div style="text-align: center; border-top: 1px solid var(--color-outline-variant); padding-top: 12px;">
            <a href="../index.html" style="font-size: 13px; font-weight: 600; color: var(--color-on-surface-variant); hover:text-primary;" class="text-on-surface-variant">
                <span>Return to Student Storefront</span>
            </a>
        </div>

    </div>

    <!-- Asynchronous JS Modules -->
    <script src="../js/data.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
